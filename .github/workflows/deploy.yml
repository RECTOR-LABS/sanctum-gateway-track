name: Deploy Backend to reclabs3

# Frontend auto-deploys via Vercel's GitHub integration.
# This workflow only deploys the backend to reclabs3.
on:
  push:
    branches: [main]
    paths:
      - 'src/backend/**'
      - 'src/shared/**'
      - 'ecosystem.config.cjs'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy-backend:
    name: Deploy backend
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            cd ~/sanctum-gateway-track

            echo "==> git fetch + reset to origin/${{ github.ref_name }}"
            git fetch origin
            git reset --hard origin/${{ github.ref_name }}

            echo "==> npm ci + build (backend)"
            cd src/backend
            npm ci --omit=optional
            npm run build

            echo "==> pm2 restart sanctum-backend"
            pm2 restart sanctum-backend --update-env

            echo "==> wait for service to settle, then health check"
            sleep 3
            curl -sf http://127.0.0.1:3001/health | head -c 400
            echo
            echo "==> deploy complete"
